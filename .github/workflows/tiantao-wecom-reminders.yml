name: 天淘小分队

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      reminder:
        description: Which reminder to send
        required: true
        default: store-ranking
        type: choice
        options:
          - store-ranking
          - weekly-report
          - both

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send store ranking reminder
        if: (github.event_name == 'schedule' && github.event.schedule == '0 2 * * *') || (github.event_name == 'workflow_dispatch' && (inputs.reminder == 'store-ranking' || inputs.reminder == 'both'))
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
        run: |
          content=$(cat <<'EOF'
          店铺排名发一下
          @韦帅康
          @于伟伦
          @李宏涛
          EOF
          )
          payload=$(jq -nc --arg content "$content" '{msgtype:"text",text:{content:$content}}')
          curl --silent --show-error --fail -H 'Content-Type: application/json' -d "$payload" "$WECOM_WEBHOOK_URL"

      - name: Send weekly report reminder
        if: (github.event_name == 'schedule' && github.event.schedule == '0 2 * * 1') || (github.event_name == 'workflow_dispatch' && (inputs.reminder == 'weekly-report' || inputs.reminder == 'both'))
        env:
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
        run: |
          content=$(cat <<'EOF'
          请准备好周报，包括超A。
          @所有人
          EOF
          )
          payload=$(jq -nc --arg content "$content" '{msgtype:"text",text:{content:$content,mentioned_mobile_list:["@all"]}}')
          curl --silent --show-error --fail -H 'Content-Type: application/json' -d "$payload" "$WECOM_WEBHOOK_URL"
